controller_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    odom_topic: chassis_odometry      # P4: MPPI 速度反馈用底盘系(解耦云台瞄准); 见 odom_bridge chassis_odometry
    controller_frequency: 30.0
    # 30Hz controller 一周期 33ms; odom→map TF 由 small_gicp 周期更新, 实测会
    # 落后 controller 请求 10-30ms 触发 "extrapolation into the future" abort.
    # 0.3s 给 TF 抖动留 9 个 controller 周期的兜底.
    transform_tolerance: 0.3
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001  # omni 主线 vy 必须保留，起步时低速 vy 不得被吞
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 5.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      # 全向+自旋工况下定位/跟踪有抖动，适当放大到点半径便于判定 goal reached
      xy_goal_tolerance: 0.40
      yaw_goal_tolerance: 6.28
    FollowPath:
      # MPPI(Omni 全向)控制器: 预测性平滑避障 + 全向 vx/vy。替换原 OmniPidPursuit(回退: git revert 本提交)
      # 实车需调: batch_size(CPU 与 Point-LIO 共核)、vx/vy_max(底盘能力)、critic 权重
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40
      model_dt: 0.05                    # 必须 ≥ 控制周期(1/30≈0.0333); 预测时域 = model_dt×time_steps = 2.0s
      batch_size: 1000                  # CPU 保守起步; 实测有余量可加到 2000
      vx_max: 1.5
      vx_min: -1.5
      vy_max: 1.5                        # 全向: 侧向全速
      wz_max: 0.5                        # 低角速度权限: 航向由自旋/云台负责(don't-care), 防底盘空转
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.2
      ax_max: 3.0
      ax_min: -3.0
      ay_max: 3.0
      ay_min: -3.0
      az_max: 3.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.3          # 对抗 odom→map TF 滞后, 与 controller_server 顶层一致
      temperature: 0.3
      gamma: 0.015
      motion_model: "Omni"              # 关键: 全向模型, 采样 vy
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      # 仅保留位置类 critic; 航向类(GoalAngle/PathAngle/PreferForward)因 don't-care 朝向去掉
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "PathAlignCritic", "PathFollowCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 1.4
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4


local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 30.0
      publish_frequency: 30.0
      global_frame: odom
      robot_base_frame: gimbal_yaw_fake
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.35
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]
      intensity_voxel_layer:
        plugin: nav2_costmap_2d_plugins::IntensityVoxelLayer
        enabled: true
        track_unknown_space: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        combination_method: 1
        mark_threshold: 0
        origin_z: 0.0
        unknown_threshold: 5
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.0
        max_obstacle_height: 2.0
        min_obstacle_intensity: 0.05
        max_obstacle_intensity: 2.0
        observation_sources: terrain_map
        terrain_map:
          data_type: PointCloud2
          topic: <robot_namespace>/terrain_map
          sensor_frame: front_mid360
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: False

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: map
      robot_base_frame: gimbal_yaw_fake
      robot_radius: 0.30
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]
      intensity_voxel_layer:
        plugin: nav2_costmap_2d_plugins::IntensityVoxelLayer
        enabled: true
        track_unknown_space: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        combination_method: 1
        mark_threshold: 0
        origin_z: 0.0
        unknown_threshold: 5
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.0
        max_obstacle_height: 2.0
        min_obstacle_intensity: 0.05
        max_obstacle_intensity: 2.0
        observation_sources: terrain_map_ext
        terrain_map_ext:
          data_type: PointCloud2
          topic: <robot_namespace>/terrain_map_ext
          sensor_frame: front_mid360
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: False

# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the tb3_simulation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
map_server:
  ros__parameters:
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 2.0       # 与 BT RateController hz=5 + max_planning_time=5 现实匹配，避免周期性 warn
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.5
      allow_unknown: true
      downsample_costmap: true            # P1: 在降采样图上规划, 5cm→10cm 等效, 规划提速 2-4x
      downsampling_factor: 2              # 注意: 10cm 栅格下 <~0.7m 窄缝需实车确认可通过
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0              # 单次规划允许跑满，避免被中途 abort 后 BT RecoveryNode 反复重试 (1s × 3 retries = 4s 长尾)
      cost_travel_multiplier: 3.0
      smooth_path: true
      smoother:
        max_iterations: 50                # 200 → 50，平滑只是修边，A* 已经给出主路径
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true               # P1: 开启精细化, 路径更柔和(上游作者注: 显著更好); downsample 已省出时间预算

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 20.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors_plugins::BackUpFreeSpace"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: odom
    global_frame: map
    robot_base_frame: gimbal_yaw_fake
    transform_tolerance: 0.3                              # 与 controller 一致
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2
    # params for nav2_behaviors_plugins::BackUpFreeSpace
    service_name: "global_costmap/get_costmap"
    max_radius: 2.0
    visualize: false

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    enable_stamped_cmd_vel: true
    smoothing_frequency: 30.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.5, 1.5, 3.0]
    min_velocity: [-1.5, -1.5, -3.0]
    max_accel: [3.0, 3.0, 5.0]
    max_decel: [-3.0, -3.0, -5.0]
    odom_topic: "odometry"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
